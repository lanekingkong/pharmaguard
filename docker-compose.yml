version: '3.8'

services:
  # Neo4j Knowledge Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: pharmaguard-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - ./data/kg_scripts:/scripts
    networks:
      - pharmaguard-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "$${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # PharmaGuard API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmaguard-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - LOG_LEVEL=INFO
      - PHARMAGUARD_ENV=production
    volumes:
      - model_data:/app/models
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - pharmaguard-net
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  # PharmaGuard Web Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmaguard-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    depends_on:
      - api
    networks:
      - pharmaguard-net
    command: ["dashboard"]
    restart: unless-stopped

  # Optional: Jupyter Notebook for research
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: pharmaguard-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    volumes:
      - ./notebooks:/home/jovyan/work
      - model_data:/home/jovyan/models
    networks:
      - pharmaguard-net
    profiles:
      - research

  # Optional: pgAdmin for monitoring
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pharmaguard-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@pharmaguard.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pharmaguard-net
    profiles:
      - monitoring

networks:
  pharmaguard-net:
    driver: bridge

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  model_data:
    driver: local
  pgadmin_data:
    driver: local